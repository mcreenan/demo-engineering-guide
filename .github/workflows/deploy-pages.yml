name: Deploy to GitHub Pages

# Publishes the committed build bundle to GitHub Pages on every push to main.
# The bundle is NOT built here — run `pal build` locally and commit the result
# (guide + changelog HTML, css/js, vendored Mermaid) before pushing.
on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual re-deploys from the Actions tab

# Least-privilege token: read the repo, write Pages, mint the OIDC token deploy-pages needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Stage the published bundle
        run: |
          mkdir -p _site
          # HTML pages (guide + changelog) and their assets (css/js + vendored Mermaid).
          cp demo-engineering-guide.html \
             demo-engineering-guide.css \
             demo-engineering-guide.js \
             changelog.html \
             _site/
          cp -R vendor _site/vendor
          # Image assets, if the bundle ever ships any (no-op while absent).
          [ -d assets ] && cp -R assets _site/assets || true
          # Root URL -> the guide. Keeps the original filename so the changelog's
          # back-link (href="demo-engineering-guide.html") still resolves.
          cat > _site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=./demo-engineering-guide.html">
          <link rel="canonical" href="./demo-engineering-guide.html">
          <title>Demo Engineering Guide</title>
          <a href="./demo-engineering-guide.html">Demo Engineering Guide</a>
          HTML

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
